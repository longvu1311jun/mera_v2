<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/meraicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xem Logs Hệ Thống</title>
  <script th:replace="~{fragments/mera-layout :: themeInit}"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/mera-ui.css">
  <style>
    /* CSS đặc thù trang logs (danh sách log entry, không phải bảng) */
    .page-heading {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .filters-card { margin-bottom: 20px; }

    .logs-card {
      max-height: 640px;
      overflow-y: auto;
      background: var(--mr-surface-2);
    }

    .log-entry {
      padding: 12px 16px;
      border-bottom: 1px solid var(--mr-border-soft);
    }

    .log-entry:hover { background: var(--mr-surface); }
    .log-entry:last-child { border-bottom: none; }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .log-level {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--mr-radius-pill);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      background: var(--mr-surface);
      color: var(--mr-muted);
    }

    /* th:classappend sinh class "log-level.ERROR" (có dấu chấm) nên cần selector escape */
    .log-level.ERROR, .log-level\.ERROR { background: var(--mr-danger-bg); color: var(--mr-danger); }
    .log-level.WARN, .log-level\.WARN { background: var(--mr-warn-bg); color: var(--mr-warn); }
    .log-level.INFO, .log-level\.INFO { background: var(--mr-accent-soft); color: var(--mr-accent); }
    .log-level.DEBUG, .log-level\.DEBUG { background: var(--mr-surface); color: var(--mr-muted); }

    .log-timestamp {
      color: var(--mr-muted);
      font-size: 12px;
      font-family: var(--mr-mono);
    }

    .log-logger {
      color: var(--mr-muted);
      font-size: 12px;
      font-style: italic;
      margin-top: 5px;
    }

    .log-message {
      color: var(--mr-text);
      margin-top: 8px;
      word-break: break-word;
      white-space: pre-wrap;
      font-family: var(--mr-mono);
      font-size: 13px;
    }

    .log-stacktrace {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--mr-surface-2);
      border-left: 3px solid var(--mr-danger);
      border-radius: var(--mr-radius-control);
      font-family: var(--mr-mono);
      font-size: 12px;
      color: var(--mr-danger);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    .toggle-stacktrace {
      color: var(--mr-accent);
      cursor: pointer;
      font-size: 12px;
      margin-top: 5px;
      text-decoration: underline;
    }

    .toggle-stacktrace:hover { color: var(--mr-accent-hover); }
  </style>
</head>
<body class="mera-page">
<div class="mr-shell">
  <th:block th:replace="~{fragments/mera-layout :: sidebar('logs')}"></th:block>
  <div class="mr-shell-main">
    <th:block th:replace="~{fragments/mera-layout :: topbar('Logs Realtime')}"></th:block>
    <main class="mr-shell-content">
    <h1 class="page-heading"><span>📋</span> Xem Logs Hệ Thống</h1>

    <div class="mr-stat-grid">
      <div class="mr-stat mr-stat--accent">
        <div class="mr-stat-label">Tổng số logs</div>
        <div class="mr-stat-value" th:text="${totalLogs}">0</div>
      </div>
      <div class="mr-stat mr-stat--danger">
        <div class="mr-stat-label">ERROR</div>
        <div class="mr-stat-value" th:text="${errorCount}">0</div>
      </div>
      <div class="mr-stat mr-stat--warn">
        <div class="mr-stat-label">WARN</div>
        <div class="mr-stat-value" th:text="${warnCount}">0</div>
      </div>
      <div class="mr-stat mr-stat--info">
        <div class="mr-stat-label">INFO</div>
        <div class="mr-stat-value" th:text="${infoCount}">0</div>
      </div>
    </div>

    <div class="actions">
      <a th:href="@{/logs/clear}" class="mr-btn mr-btn--danger"
         onclick="return confirm('Bạn có chắc muốn xóa tất cả logs?');">🗑️ Xóa Tất Cả Logs</a>
      <a th:href="@{/logs}" class="mr-btn mr-btn--ghost">🔄 Làm Mới</a>
    </div>

    <form method="get" action="/logs" class="mr-card filters-card">
      <div class="mr-form-row">
        <div class="mr-field">
          <label for="level">Mức độ:</label>
          <select id="level" name="level" class="mr-select">
            <option value="">Tất cả</option>
            <option value="ERROR" th:selected="${currentLevel == 'ERROR'}">ERROR</option>
            <option value="WARN" th:selected="${currentLevel == 'WARN'}">WARN</option>
            <option value="INFO" th:selected="${currentLevel == 'INFO'}">INFO</option>
            <option value="DEBUG" th:selected="${currentLevel == 'DEBUG'}">DEBUG</option>
          </select>
        </div>

        <div class="mr-field">
          <label for="search">Tìm kiếm:</label>
          <input type="text" id="search" name="search" class="mr-input"
                 th:value="${currentSearch}"
                 placeholder="Tìm trong message hoặc logger...">
        </div>

        <div class="mr-field">
          <label for="limit">Số lượng:</label>
          <input type="number" id="limit" name="limit" class="mr-input"
                 th:value="${currentLimit}"
                 min="10" max="1000" step="10">
        </div>

        <button type="submit" class="mr-btn mr-btn--primary">🔍 Tìm Kiếm</button>
      </div>
    </form>

    <div class="mr-card mr-card--flush logs-card" th:if="${logs != null and !logs.empty}">
      <div th:each="log : ${logs}" class="log-entry">
        <div class="log-header">
          <span class="log-level" th:classappend="${'log-level.' + log.level}"
                th:text="${log.level}">INFO</span>
          <span class="log-timestamp" th:text="${log.timestampFormatted}">2025-12-08 10:00:00.000</span>
        </div>

        <div class="log-logger" th:text="${log.logger}">com.example.Logger</div>

        <div class="log-message" th:text="${log.message}">Log message here</div>

        <div th:if="${log.hasStackTrace()}">
          <span class="toggle-stacktrace"
                th:onclick="'toggleStackTrace(' + ${logStat.index} + ')'">
            📄 Xem Stack Trace
          </span>
          <div th:id="'stacktrace-' + ${logStat.index}"
               class="log-stacktrace"
               style="display: none;"
               th:text="${log.stackTrace}">
            Stack trace here
          </div>
        </div>
      </div>
    </div>

    <div class="mr-card mr-empty" th:if="${logs == null or logs.empty}">
      <p>📭 Không có logs nào</p>
      <p style="font-size: 12px; margin-top: 10px;">Logs sẽ được hiển thị khi hệ thống hoạt động</p>
    </div>
    </main>
    <footer class="mr-shell-footer">MeraGroup Dashboard v2.0</footer>
  </div>
</div>

  <script>
    function toggleStackTrace(index) {
      const element = document.getElementById('stacktrace-' + index);
      if (element) {
        element.style.display = element.style.display === 'none' ? 'block' : 'none';
      }
    }

    // Auto refresh mỗi 30 giây
    setTimeout(function() {
      location.reload();
    }, 30000);
  </script>
  <th:block th:replace="~{fragments/mera-layout :: shellScript}"></th:block>
</body>
</html>

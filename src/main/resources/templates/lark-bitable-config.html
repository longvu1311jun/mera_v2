<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/meraicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cấu hình Lark Bitex | Mera V2</title>
    <script th:replace="~{fragments/mera-layout :: themeInit}"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/mera-ui.css">
    <style>
        /* Config List */
        .config-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        /* Giữ tên class 'config-item' + 'default' vì th:classappend dùng 'default' */
        .config-item.default {
            border-color: var(--mr-success);
            background: var(--mr-success-bg);
        }

        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .config-name {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-actions {
            display: flex;
            gap: 8px;
        }

        .config-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 14px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--mr-muted);
            font-weight: 500;
        }

        .detail-value {
            font-size: 13px;
            word-break: break-all;
        }

        .detail-value.masked {
            color: var(--mr-muted);
        }

        /* Add Form */
        .form-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width { grid-column: span 2; }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--mr-text-2);
        }

        .form-checkbox {
            flex-direction: row;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .form-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--mr-accent);
        }

        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Toast (id + class 'show'/'error' do JS điều khiển - giữ nguyên) */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--mr-success);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: var(--mr-radius-control);
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--mr-shadow-md);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.error { background: var(--mr-danger); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body class="mera-page">
    <div class="mr-shell">
    <th:block th:replace="~{fragments/mera-layout :: sidebar('larkBitable')}"></th:block>
    <div class="mr-shell-main">
    <th:block th:replace="~{fragments/mera-layout :: topbar('Lark Bitable Config')}"></th:block>
    <main class="mr-shell-content">
        <div class="mr-page-header">
            <div>
                <h1 class="mr-page-title"><span>📋</span> Cấu hình Lark Bitex</h1>
            </div>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${success}" id="toast" class="show" th:text="${success}"></div>
        <div th:if="${error}" id="toast" class="show error" th:text="${error}"></div>

        <!-- Config List -->
        <div class="config-list" th:if="${not #lists.isEmpty(configs)}">
            <div class="mr-card config-item" th:classappend="${config.isDefault ? 'default' : ''}" th:each="config : ${configs}">
                <div class="config-header">
                    <div class="config-name">
                        <span th:text="${config.configName}">Config Name</span>
                        <span class="mr-badge mr-badge--success" th:if="${config.isDefault}">Mặc định</span>
                    </div>
                    <div class="config-actions">
                        <form th:if="${!config.isDefault}" th:action="@{/admin/lark-bitable/set-default/{id}(id=${config.id})}" method="post" style="display:inline;">
                            <button type="submit" class="mr-btn mr-btn--primary">Đặt mặc định</button>
                        </form>
                        <form th:action="@{/admin/lark-bitable/delete/{id}(id=${config.id})}" method="post" style="display:inline;"
                              onsubmit="return confirm('Xóa cấu hình này?')">
                            <button type="submit" class="mr-btn mr-btn--danger">Xóa</button>
                        </form>
                    </div>
                </div>
                <div class="config-details">
                    <div class="detail-item">
                        <span class="detail-label">Base Name</span>
                        <span class="detail-value" th:text="${config.baseName}">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Base ID</span>
                        <span class="detail-value" th:text="${config.baseId}">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Table Name</span>
                        <span class="detail-value" th:text="${config.tableName}">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Table ID</span>
                        <span class="detail-value" th:text="${config.tableId}">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">View ID</span>
                        <span class="detail-value" th:text="${config.viewId}">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">User Access Token</span>
                        <span class="detail-value masked" th:text="${config.userAccessToken != null ? #strings.substring(config.userAccessToken, 0, 10) + '...' : '-'}">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Shop ID</span>
                        <span class="detail-value" th:text="${config.shopId}">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Form (only shown when no configs exist) -->
        <div class="mr-card add-form" th:if="${#lists.isEmpty(configs)}">
            <div class="form-title">
                <span>➕</span> Thêm cấu hình mới
            </div>
            <form th:action="@{/admin/lark-bitable/save}" th:object="${newConfig}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Tên cấu hình *</label>
                        <input type="text" class="mr-input" th:field="*{configName}" placeholder="VD: Bitex Khách hàng" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Shop ID</label>
                        <input type="number" class="mr-input" th:field="*{shopId}" placeholder="1546758">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Base Name</label>
                        <input type="text" class="mr-input" th:field="*{baseName}" placeholder="VD: Database Khách Hàng">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Base ID *</label>
                        <input type="text" class="mr-input" th:field="*{baseId}" placeholder="VD: XusHwhacQiVeXFkdfIVlQcu3gHb" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Table Name</label>
                        <input type="text" class="mr-input" th:field="*{tableName}" placeholder="VD: Bảng chính">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Table ID *</label>
                        <input type="text" class="mr-input" th:field="*{tableId}" placeholder="VD: tbltnSA9RaLR91Qc" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">View ID</label>
                        <input type="text" class="mr-input" th:field="*{viewId}" placeholder="VD: vew5Ou4Kee">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">User Access Token</label>
                        <input type="text" class="mr-input" th:field="*{userAccessToken}" placeholder="Token từ Lark Developer Console">
                    </div>
                    <div class="form-group full-width form-checkbox">
                        <input type="checkbox" th:field="*{isDefault}" id="isDefault">
                        <label for="isDefault">Đặt làm cấu hình mặc định</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="reset" class="mr-btn mr-btn--ghost">Reset</button>
                    <button type="submit" class="mr-btn mr-btn--primary">💾 Lưu cấu hình</button>
                </div>
            </form>
        </div>

        <!-- Empty State when configs exist -->
        <div th:if="${not #lists.isEmpty(configs)}" style="text-align: center; padding: 30px; margin-top: 20px;">
            <a href="#" onclick="showAddForm()" style="color: var(--mr-accent); text-decoration: none; font-weight: 500;">
                ➕ Thêm cấu hình mới
            </a>
        </div>

        <!-- Hidden Add Form (for when configs exist - toggle display) -->
        <div class="mr-card add-form" id="addFormContainer" style="display: none;">
            <div class="form-title">
                <span>➕</span> Thêm cấu hình mới
            </div>
            <form th:action="@{/admin/lark-bitable/save}" th:object="${newConfig}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Tên cấu hình *</label>
                        <input type="text" class="mr-input" th:field="*{configName}" placeholder="VD: Bitex Khách hàng" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Shop ID</label>
                        <input type="number" class="mr-input" th:field="*{shopId}" placeholder="1546758">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Base Name</label>
                        <input type="text" class="mr-input" th:field="*{baseName}" placeholder="VD: Database Khách Hàng">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Base ID *</label>
                        <input type="text" class="mr-input" th:field="*{baseId}" placeholder="VD: XusHwhacQiVeXFkdfIVlQcu3gHb" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Table Name</label>
                        <input type="text" class="mr-input" th:field="*{tableName}" placeholder="VD: Bảng chính">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Table ID *</label>
                        <input type="text" class="mr-input" th:field="*{tableId}" placeholder="VD: tbltnSA9RaLR91Qc" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">View ID</label>
                        <input type="text" class="mr-input" th:field="*{viewId}" placeholder="VD: vew5Ou4Kee">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">User Access Token</label>
                        <input type="text" class="mr-input" th:field="*{userAccessToken}" placeholder="Token từ Lark Developer Console">
                    </div>
                    <div class="form-group full-width form-checkbox">
                        <input type="checkbox" th:field="*{isDefault}" id="isDefault2">
                        <label for="isDefault2">Đặt làm cấu hình mặc định</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="mr-btn mr-btn--ghost" onclick="hideAddForm()">Hủy</button>
                    <button type="submit" class="mr-btn mr-btn--primary">💾 Lưu cấu hình</button>
                </div>
            </form>
        </div>
    </main>
    <footer class="mr-shell-footer">MeraGroup Dashboard v2.0</footer>
    </div>
    </div>
    <th:block th:replace="~{fragments/mera-layout :: shellScript}"></th:block>

    <script>
        // Toggle add form visibility
        function showAddForm() {
            document.getElementById('addFormContainer').style.display = 'block';
        }

        function hideAddForm() {
            document.getElementById('addFormContainer').style.display = 'none';
        }

        // Auto-hide toast
        setTimeout(() => {
            const toast = document.getElementById('toast');
            if (toast) toast.classList.remove('show');
        }, 4000);
    </script>
</body>
</html>

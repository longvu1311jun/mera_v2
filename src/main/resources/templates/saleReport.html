<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <script th:replace="~{fragments/mera-layout :: themeInit}"></script>
    <link rel="icon" type="image/jpeg" href="/meraicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Báo Cáo Sale 1 | MeraGroup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/mera-ui.css">
  <style>
    /* Alias hệ biến cũ sang token mera-ui (giữ tương thích inline style / chuỗi HTML do JS render) */
    :root {
      --color-primary: var(--mr-accent);
      --color-primary-hover: var(--mr-accent-hover);
      --color-canvas: var(--mr-canvas);
      --color-canvas-soft: var(--mr-surface-2);
      --color-surface: var(--mr-surface);
      --color-ink: var(--mr-text);
      --color-body: var(--mr-text-2);
      --color-muted: var(--mr-muted);
      --color-hairline: var(--mr-border);
      --color-hairline-strong: #cfcdc4;
      --color-on-primary: #ffffff;
      --color-success: #16a34a;
      --color-error: #dc2626;
      --color-warning: #d97706;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Workspace header cố định trên cùng, phần còn lại cuộn nội bộ */
    .mr-workspace-header {
      flex-shrink: 0;
    }

    #contentSection {
      padding: 16px 24px 20px;
    }

    /* Header - compact */
    .page-header {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .page-subtitle {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--mr-text);
    }

    .page-meta {
      font-size: 12px;
      color: var(--mr-muted);
      margin-top: 2px;
    }

    .page-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    /* Form Elements */
    select, input.search {
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-control);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--mr-surface);
      color: var(--mr-text);
      cursor: pointer;
    }

    select:focus, input.search:focus {
      outline: none;
      border-color: var(--mr-accent);
      box-shadow: 0 0 0 3px rgba(20, 86, 240, 0.12);
    }

    input.search {
      width: 220px;
    }

    button {
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-control);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      background: var(--mr-surface);
      color: var(--mr-text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: var(--mr-surface-2);
    }

    button.primary {
      background: var(--mr-accent);
      color: #ffffff;
      border: 1px solid transparent;
    }

    button.primary:hover {
      background: var(--mr-accent-hover);
    }

    a.btn-excel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--mr-radius-control);
      background: #16a34a;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    a.btn-excel:hover {
      background: #15803d;
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--mr-surface);
      border: 1px solid var(--mr-border);
      margin-bottom: 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .alert.error {
      background: var(--mr-danger-bg);
      border-color: #fca5a5;
      color: var(--mr-danger);
    }

    /* Table Container - fills remaining space */
    .table-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--mr-surface);
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-card);
      overflow: hidden;
      min-height: 0;
    }

    /* Table wrapper for sticky header */
    .table-wrapper {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    table.mr-table {
      min-width: 800px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead th.sortable {
      cursor: pointer;
      user-select: none;
    }

    thead th.sortable:hover {
      background: var(--mr-accent-soft);
      color: var(--mr-accent);
    }

    thead th .sort-indicator {
      margin-left: 6px;
      font-size: 11px;
      opacity: 0.7;
    }

    .mr-table tbody td {
      padding: 8px 12px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .mr-table tbody tr:nth-child(even) {
      background: var(--mr-surface-2);
    }

    /* Footer - fixed at bottom */
    tfoot {
      position: sticky;
      bottom: 0;
      z-index: 5;
    }

    tfoot tr {
      background: var(--mr-surface-2);
      font-weight: 600;
    }

    tfoot td {
      padding: 10px 12px;
      border-top: 2px solid var(--mr-accent);
      font-size: 12px;
      color: var(--mr-text);
    }

    .center {
      text-align: center;
    }

    /* Pills */
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 10px;
      border-radius: var(--mr-radius-pill);
      font-weight: 600;
      font-size: 11px;
    }

    .pill.green { background: var(--mr-success-bg); color: var(--mr-success); }
    .pill.red { background: var(--mr-danger-bg); color: var(--mr-danger); }

    /* No Token */
    .no-token {
      max-width: 500px;
      margin: auto;
      background: var(--mr-surface);
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-card);
      padding: 24px;
      text-align: center;
    }

    .no-token h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .no-token p {
      color: var(--mr-muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .no-token a {
      color: var(--mr-accent);
      text-decoration: none;
      font-weight: 600;
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: color-mix(in srgb, var(--mr-canvas) 95%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-content {
      background: var(--mr-surface);
      padding: 24px 40px;
      border-radius: var(--mr-radius-card);
      text-align: center;
      border: 1px solid var(--mr-border);
    }

    .loading-spinner {
      border: 3px solid var(--mr-border);
      border-top: 3px solid var(--mr-accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-overlay.hidden {
      display: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        height: auto;
        overflow: auto;
      }

      #contentSection {
        padding: 12px;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .page-actions {
        width: 100%;
        flex-wrap: wrap;
      }

      input.search {
        width: 100%;
      }

      .table-container {
        height: auto;
        min-height: 400px;
      }
    }
  </style>
</head>

<body class="mera-page">

<th:block th:replace="~{fragments/mera-layout :: workspaceHeader('Báo Cáo Sale 1')}"></th:block>

<!-- Loading popup -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div style="font-size: 13px; color: var(--color-body);">Đang tải dữ liệu...</div>
  </div>
</div>

<div id="noTokenSection" class="no-token" style="display:none;">
  <h2>Chưa có token</h2>
  <div style="color:var(--color-muted)">Đăng nhập Lark trước rồi quay lại trang report.</div>
  <div style="margin-top:12px;">
    <a href="/home">→ Về trang đăng nhập</a>
  </div>
</div>

<div id="contentSection" style="display:none; flex: 1; display: flex; flex-direction: column; min-height: 0;">
  <div class="page-header">
    <div>
      <div class="page-subtitle">📈 Tổng hợp theo tư vấn viên</div>
      <div class="page-meta" id="metaInfo"></div>
    </div>

    <div class="page-actions">
      <input id="searchInput" class="search" type="search" placeholder="Tìm tư vấn viên..." />

      <form method="get" action="/saleReport" id="rangeForm" style="display: flex; gap: 6px; align-items: center;">
        <select name="range" id="rangeSelect">
          <option value="CurrentMonth" id="optCurrentMonth">Tháng này</option>
          <option value="LastMonth" id="optLastMonth">Tháng trước</option>
        </select>
        <button type="submit" class="mr-btn">Lọc</button>
      </form>

      <form method="post" action="/saleReport/refresh" id="refreshForm">
        <input type="hidden" name="range" id="refreshRange" />
        <button class="mr-btn mr-btn--primary" type="submit">🔄 Làm mới</button>
      </form>

      <a href="#" id="exportExcelBtn" class="btn-excel">
        📥 Excel
      </a>
    </div>
  </div>

  <div id="errorAlert" class="alert error" style="display:none;">
    <strong>Lỗi:</strong> <span id="errorText"></span>
  </div>

  <div class="table-container">
    <div class="table-wrapper">
      <table class="mr-table">
        <thead>
        <tr>
          <th style="width:50px;">#</th>
          <th style="min-width:180px;">Tư vấn viên</th>
          <th class="center">Nhu cầu</th>
          <th class="center">Trùng</th>
          <th class="center">Rác</th>
          <th class="center">Không tương tác</th>
          <th class="center">Tổng mess</th>
          <th class="center">Tổng đơn</th>
          <th class="center">Hủy</th>
          <th class="center">Đơn/mess NC</th>
          <th class="center">Đơn/mess Tổng</th>
          <th class="center">Tỉ lệ hủy</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>

        <tfoot id="tableFoot">
          <tr>
            <td colspan="2" class="center">TỔNG</td>
            <td class="center" id="totalNhuCau">0</td>
            <td class="center" id="totalTrung">0</td>
            <td class="center" id="totalRac">0</td>
            <td class="center" id="totalKhongTuongTac">0</td>
            <td class="center" id="totalTongMess">0</td>
            <td class="center" id="totalTongDon">0</td>
            <td class="center" id="totalDonHuyDb">0</td>
            <td class="center">—</td>
            <td class="center">—</td>
            <td class="center" id="totalTiLeHuy">0%</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>

<script>
let saleRows = [];
let saleOriginalRows = [];

document.addEventListener('DOMContentLoaded', function(){
  const table = document.querySelector('table');
  if(!table) return;
  const tbody = table.querySelector('tbody');
  saleRows = Array.from(tbody.querySelectorAll('tr')).filter(r=> r.querySelectorAll('td').length>0);
  saleOriginalRows = saleRows.slice();
  const searchInput = document.getElementById('searchInput');
  const optCurrentMonth = document.getElementById('optCurrentMonth');
  const optLastMonth = document.getElementById('optLastMonth');

  const now = new Date();
  const currentMonth = now.getMonth() + 1;
  const lastMonth = currentMonth === 1 ? 12 : currentMonth - 1;
  if (optCurrentMonth) optCurrentMonth.textContent = `Tháng ${currentMonth}`;
  if (optLastMonth) optLastMonth.textContent = `Tháng ${lastMonth}`;

  const ths = Array.from(table.querySelectorAll('thead th'));
  ths.forEach((th, idx)=>{
    if(idx===0 || idx===10 || idx===11) return;
    th.classList.add('sortable');
    const span = document.createElement('span');
    span.className = 'sort-indicator';
    th.appendChild(span);
    th.dataset.sortState = 'none';
    th.addEventListener('click', ()=>{
      const state = th.dataset.sortState;
      const next = state==='none' ? 'asc' : state==='asc' ? 'desc' : 'none';
      ths.forEach(t=>{ if(t!==th){ t.dataset.sortState='none'; const si = t.querySelector('.sort-indicator'); if(si) si.textContent=''; }});
      th.dataset.sortState = next;
      const ind = th.querySelector('.sort-indicator');
      if(ind) ind.textContent = next==='asc' ? '▲' : next==='desc' ? '▼' : '';
      if(next==='none'){
        restoreOriginalOrder();
        applyFilter();
      } else {
        sortByColumn(idx, next);
      }
    });
  });

  function parseCellValue(text){
    if(!text) return '';
    const cleaned = text.replace('%','').trim();
    if(cleaned==='') return '';
    const normalized = cleaned.replace(/\./g,'').replace(',', '.');
    const n = parseFloat(normalized);
    if(!isNaN(n)) return n;
    return cleaned.toLowerCase();
  }

  function sortByColumn(idx, order){
    const visible = saleRows.filter(r=> r.style.display !== 'none');
    visible.sort((a,b)=>{
      const aV = parseCellValue((a.children[idx]||{}).textContent||'');
      const bV = parseCellValue((b.children[idx]||{}).textContent||'');
      if(typeof aV === 'number' && typeof bV === 'number'){
        return order==='asc' ? aV - bV : bV - aV;
      } else {
        return order==='asc' ? String(aV).localeCompare(String(bV)) : String(bV).localeCompare(String(aV));
      }
    });
    const hidden = saleOriginalRows.filter(r=> r.style.display === 'none');
    tbody.innerHTML = '';
    visible.forEach(r=> tbody.appendChild(r));
    hidden.forEach(r=> tbody.appendChild(r));
  }

  function restoreOriginalOrder(){
    tbody.innerHTML = '';
    saleOriginalRows.forEach(r=> tbody.appendChild(r));
    saleRows = Array.from(tbody.querySelectorAll('tr')).filter(r=> r.querySelectorAll('td').length>0);
    updateTotalsFromVisibleRows();
  }

  function applyFilter(){
    const q = (searchInput ? searchInput.value : '').trim().toLowerCase();
    saleRows.forEach(r=>{
      const nameCell = r.children[1];
      const text = nameCell ? nameCell.textContent.toLowerCase() : '';
      r.style.display = q === '' || text.indexOf(q) !== -1 ? '' : 'none';
    });
    updateTotalsFromVisibleRows();
    const activeTh = ths.find(t=> t.dataset.sortState && t.dataset.sortState!=='none');
    if(activeTh){
      sortByColumn(ths.indexOf(activeTh), activeTh.dataset.sortState);
    }
  }

  function updateTotalsFromVisibleRows(){
    let totalNhuCau = 0, totalTrung = 0, totalRac = 0, totalKhongTuongTac = 0;
    let totalDonHuy = 0, totalTongMess = 0, totalTongDon = 0;
    const visibleRows = saleRows.filter(r => r.style.display !== 'none');
    visibleRows.forEach(tr => {
      const cells = tr.children;
      if (cells.length >= 12) {
        totalNhuCau += parseInt(cells[2].textContent.replace(/\./g, '')) || 0;
        totalTrung += parseInt(cells[3].textContent.replace(/\./g, '')) || 0;
        totalRac += parseInt(cells[4].textContent.replace(/\./g, '')) || 0;
        totalKhongTuongTac += parseInt(cells[5].textContent.replace(/\./g, '')) || 0;
        totalTongMess += parseInt(cells[6].textContent.replace(/\./g, '')) || 0;
        totalTongDon += parseInt(cells[7].textContent.replace(/\./g, '')) || 0;
        totalDonHuy += parseInt(cells[8].textContent.replace(/\./g, '')) || 0;
      }
    });
    document.getElementById('totalNhuCau').textContent = formatNumber(totalNhuCau);
    document.getElementById('totalTrung').textContent = formatNumber(totalTrung);
    document.getElementById('totalRac').textContent = formatNumber(totalRac);
    document.getElementById('totalKhongTuongTac').textContent = formatNumber(totalKhongTuongTac);
    document.getElementById('totalTongMess').textContent = formatNumber(totalTongMess);
    document.getElementById('totalTongDon').textContent = formatNumber(totalTongDon);
    document.getElementById('totalDonHuyDb').textContent = formatNumber(totalDonHuy);
    const totalTiLeHuy = totalTongDon > 0 ? (totalDonHuy / totalTongDon * 100) : 0;
    document.getElementById('totalTiLeHuy').textContent = formatPercent(totalTiLeHuy);
  }

  if(searchInput){
    searchInput.addEventListener('input', ()=>{ applyFilter(); });
  }
});

(async function() {
  const loadingOverlay = document.getElementById('loadingOverlay');
  const noTokenSection = document.getElementById('noTokenSection');
  const contentSection = document.getElementById('contentSection');
  const tableBody = document.getElementById('tableBody');
  const metaInfo = document.getElementById('metaInfo');
  const errorAlert = document.getElementById('errorAlert');
  const errorText = document.getElementById('errorText');
  const rangeSelect = document.getElementById('rangeSelect');
  const refreshRange = document.getElementById('refreshRange');
  
  const urlParams = new URLSearchParams(window.location.search);
  const range = urlParams.get('range') || 'CurrentMonth';
  rangeSelect.value = range;
  refreshRange.value = range;
  
  loadingOverlay.classList.remove('hidden');
  
  try {
    const response = await fetch(`/api/saleReport/data?range=${encodeURIComponent(range)}`);
    const data = await response.json();
    
    loadingOverlay.classList.add('hidden');
    
    if (!data.hasToken) {
      noTokenSection.style.display = 'block';
      return;
    }
    
    contentSection.style.display = 'flex';
    
    if (data.error) {
      errorAlert.style.display = 'flex';
      errorText.textContent = data.error;
      return;
    }
    
    let metaHtml = '';
    if (data.fetchedAt) {
      metaHtml += `Cập nhật: <strong>${data.fetchedAt}</strong>`;
    }
    if (data.totalAgents != null) {
      metaHtml += ` • <strong>${data.totalAgents}</strong> tư vấn viên`;
    }
    metaInfo.innerHTML = metaHtml;
    
    if (data.rows && data.rows.length > 0) {
      tableBody.innerHTML = '';
      data.rows.forEach((row, index) => {
        const tr = document.createElement('tr');
        const tiLeHuy = row.tiLeHuyPercent || 0;
        const tiLeHuyClass = tiLeHuy < 10 ? 'green' : 'red';
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${escapeHtml(row.tableName || '-')}</td>
          <td class="center">${formatNumber(row.nhuCau || 0)}</td>
          <td class="center">${formatNumber(row.trung || 0)}</td>
          <td class="center">${formatNumber(row.rac || 0)}</td>
          <td class="center">${formatNumber(row.khongTuongTac || 0)}</td>
          <td class="center">${formatNumber(row.tongMess || 0)}</td>
          <td class="center">${formatNumber(row.tongDon || 0)}</td>
          <td class="center">${formatNumber(row.donHuyDb || 0)}</td>
          <td class="center">${formatPercent(row.donPerMessNhuCau || 0)}</td>
          <td class="center">${formatPercent(row.donPerMessTong || 0)}</td>
          <td class="center"><span class="pill ${tiLeHuyClass}">${formatPercent(tiLeHuy)}</span></td>
        `;
        tableBody.appendChild(tr);
      });

      let totalNhuCau = 0, totalTrung = 0, totalRac = 0, totalKhongTuongTac = 0;
      let totalDonHuy = 0, totalTongMess = 0, totalTongDon = 0;
      data.rows.forEach(row => {
        totalNhuCau += row.nhuCau || 0;
        totalTrung += row.trung || 0;
        totalRac += row.rac || 0;
        totalKhongTuongTac += row.khongTuongTac || 0;
        totalDonHuy += row.donHuyDb || 0;
        totalTongMess += row.tongMess || 0;
        totalTongDon += row.tongDon || 0;
      });
      document.getElementById('totalNhuCau').textContent = formatNumber(totalNhuCau);
      document.getElementById('totalTrung').textContent = formatNumber(totalTrung);
      document.getElementById('totalRac').textContent = formatNumber(totalRac);
      document.getElementById('totalKhongTuongTac').textContent = formatNumber(totalKhongTuongTac);
      document.getElementById('totalTongMess').textContent = formatNumber(totalTongMess);
      document.getElementById('totalTongDon').textContent = formatNumber(totalTongDon);
      document.getElementById('totalDonHuyDb').textContent = formatNumber(totalDonHuy);
      const totalTiLeHuy = totalTongDon > 0 ? (totalDonHuy / totalTongDon * 100) : 0;
      document.getElementById('totalTiLeHuy').textContent = formatPercent(totalTiLeHuy);

      setTimeout(() => {
        const tbody = document.querySelector('tbody');
        if (tbody) {
          saleRows = Array.from(tbody.querySelectorAll('tr')).filter(r => r.querySelectorAll('td').length > 0);
          saleOriginalRows = saleRows.map(r => r.cloneNode(true));
        }
      }, 100);
    } else {
      tableBody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:2rem;color:var(--color-muted);">Không có dữ liệu</td></tr>';
    }
    
  } catch (error) {
    loadingOverlay.classList.add('hidden');
    contentSection.style.display = 'flex';
    errorAlert.style.display = 'flex';
    errorText.textContent = 'Lỗi khi tải dữ liệu: ' + error.message;
  }
})();

function formatNumber(num) {
  return new Intl.NumberFormat('vi-VN').format(num);
}

function formatPercent(num) {
  return num.toFixed(1).replace('.', ',') + '%';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', function() {
  const exportBtn = document.getElementById('exportExcelBtn');
  if (exportBtn) {
    exportBtn.addEventListener('click', function(e) {
      e.preventDefault();
      const urlParams = new URLSearchParams(window.location.search);
      const range = urlParams.get('range') || 'CurrentMonth';
      const exportUrl = `/saleReport/export?range=${encodeURIComponent(range)}`;
      const link = document.createElement('a');
      link.href = exportUrl;
      link.download = '';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  }
});
</script>

<th:block th:replace="~{fragments/mera-layout :: shellScript}"></th:block>

</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/meraicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu khách hàng</title>
    <script th:replace="~{fragments/mera-layout :: themeInit}"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/mera-ui.css">
    <style>
/* Style riêng của trang - phần chưa có trong mera-ui.css */
h1{ margin:0 0 12px; font-size:16px; font-weight:700; letter-spacing:-0.01em; }
.search{ display:flex; gap:8px; }
.search .mr-input{ flex:1; }

.panel{ background:var(--mr-surface); border:1px solid var(--mr-border); border-radius:var(--mr-radius-card); padding:8px 16px 12px; margin-top:16px; }
.panel-head{ display:flex; align-items:center; justify-content:space-between; padding:8px 0; }
.panel-head h2{ margin:0; font-size:15px; font-weight:600; }
.toggle-btn{ background:var(--mr-surface-2); border:1px solid var(--mr-border); padding:4px 10px; border-radius:var(--mr-radius-control); cursor:pointer; font-size:16px; color:var(--mr-text-2); font-family:inherit; }
.toggle-btn:hover{ background:var(--mr-border-soft); }
.panel-body{ padding:8px 0; }
.panel-body.collapsed{ display:none; }

/* .data-table do JS render động - giữ tên class, chỉ đưa màu về token */
.data-table{ width:100%; border-collapse:collapse; font-size:13px; }
.data-table th, .data-table td{ border:1px solid var(--mr-border-soft); padding:8px; text-align:left; }
.data-table thead th{ background:var(--mr-surface-2); font-weight:600; color:var(--mr-text-2); }
.data-table tbody tr:hover td{ background:var(--mr-accent-soft); }

        /* Responsive */
        @media (max-width: 768px) {
          h1 { font-size: 15px; }

          .search { flex-direction: column; }
          .search .mr-btn { width: 100%; }

          .panel-head { flex-direction: column; align-items: flex-start; gap: 8px; }

          .data-table { font-size: 12px; }

          .data-table th, .data-table td { padding: 6px; }
        }
    </style>
</head>
<body class="mera-page">
<th:block th:replace="~{fragments/mera-layout :: workspaceHeader('Tra Cứu Khách Hàng')}"></th:block>
<div class="mr-workspace-content">
        <div class="mr-card">
        <h1>Tra cứu khách hàng theo số điện thoại</h1>
        <div class="search">
            <input id="phoneInput" class="mr-input" type="phone" placeholder="Nhập số điện thoại..." required />
            <button id="searchBtn" class="mr-btn mr-btn--primary">Tra cứu</button>
            <button id="clearBtn" class="mr-btn mr-btn--ghost" title="Hiển thị tất cả">Xóa</button>
        </div>
        <div id="searchInfo" class="mr-alert mr-alert--info" style="margin-top:12px; margin-bottom:0; display:none;">
            <span>⏰ Thời gian tra cứu: <strong id="searchTimeText">-</strong></span>
            <span style="margin-left:16px;">⚡ Thời gian phản hồi: <strong id="responseTimeText">-</strong></span>
        </div>
        </div>

        <section class="panel">
            <header class="panel-head">
                <h2>Khách hàng</h2>
                <button class="toggle-btn" data-target="customersSection">−</button>
            </header>
            <div id="customersSection" class="panel-body"></div>
        </section>

        <section class="panel">
            <header class="panel-head">
                <h2>Ghi chú</h2>
                <button class="toggle-btn" data-target="notesSection">−</button>
            </header>
            <div id="notesSection" class="panel-body"></div>
        </section>

        <section class="panel">
            <header class="panel-head">
                <h2>Lịch hẹn trao đổi</h2>
                <button class="toggle-btn" data-target="appointmentsSection">−</button>
            </header>
            <div id="appointmentsSection" class="panel-body"></div>
        </section>
</div>
<th:block th:replace="~{fragments/mera-layout :: shellScript}"></th:block>
        <script>
let customers = [];
let notes = [];
let appointments = [];

function normalizePhone(s){ return (s||'').replace(/\D/g,''); }

function createTable(headers){
    const table = document.createElement('table');
    table.className = 'data-table';
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; tr.appendChild(th); });
    thead.appendChild(tr);
    table.appendChild(thead);
    table.appendChild(document.createElement('tbody'));
    return table;
}

function renderCustomersTable(list){
    const container = document.getElementById('customersSection');
    container.innerHTML = '';
    if(list.length === 0){
        container.innerHTML = '<p style="color:#999; padding:1rem; text-align:center;">Không có dữ liệu</p>';
        return;
    }
    const table = createTable(['Mã KH','Tên khách hàng','Điện thoại','Địa chỉ','Bệnh nền','Ghi chú','CSKH']);
    const tbody = table.querySelector('tbody');
    list.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${c.id||'-'}</td><td>${c.name||'-'}</td><td>${c.phone||'-'}</td><td>${c.address||'-'}</td><td>${c.benhNen||'-'}</td><td>${c.note||''}</td><td>${c.cskh||'-'}</td>`;
        tbody.appendChild(tr);
    });
    container.appendChild(table);
}

function renderNotesTable(list){
    const container = document.getElementById('notesSection');
    container.innerHTML = '';
    if(list.length === 0){
        container.innerHTML = '<p style="color:#999; padding:1rem; text-align:center;">Không có dữ liệu</p>';
        return;
    }
    const table = createTable(['Khách hàng','Ngày','Nội dung']);
    const tbody = table.querySelector('tbody');
    list.forEach(n => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${n.customerId||'-'}</td><td>${n.date||'-'}</td><td>${n.content||'-'}</td>`;
        tbody.appendChild(tr);
    });
    container.appendChild(table);
}

function renderAppointmentsTable(list){
    const container = document.getElementById('appointmentsSection');
    container.innerHTML = '';
    if(list.length === 0){
        container.innerHTML = '<p style="color:#999; padding:1rem; text-align:center;">Không có dữ liệu</p>';
        return;
    }
    const table = createTable(['Khách hàng','Công việc','Trạng thái','Bắt đầu','Kết thúc']);
    const tbody = table.querySelector('tbody');
    list.forEach(a => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${a.customerId||'-'}</td><td>${a.task||'-'}</td><td>${a.status||'-'}</td><td>${a.start||'-'}</td><td>${a.end||'-'}</td>`;
        tbody.appendChild(tr);
    });
    container.appendChild(table);
}

async function doSearch(){
    let phone = document.getElementById('phoneInput').value.trim();
    if(!phone){
        alert('Vui lòng nhập số điện thoại');
        return;
    }
    // Chỉ nhận số, loại bỏ tất cả ký tự không phải số
    phone = phone.replace(/\D/g, '');
    if(!phone){
        alert('Số điện thoại không hợp lệ. Vui lòng nhập số điện thoại');
        return;
    }
    // Cập nhật lại giá trị trong input (đã loại bỏ ký tự không phải số)
    document.getElementById('phoneInput').value = phone;
    
    const searchBtn = document.getElementById('searchBtn');
    const searchInfo = document.getElementById('searchInfo');
    searchBtn.disabled = true;
    searchBtn.textContent = 'Đang tìm...';
    searchInfo.style.display = 'none';
    
    try {
        const response = await fetch(`/api/tra_cuu_khach_hang?phoneNumber=${encodeURIComponent(phone)}`);
        const data = await response.json();
        
        // Hiển thị thời gian tra cứu
        if(data.searchTime){
            document.getElementById('searchTimeText').textContent = data.searchTime;
            if(data.responseTimeFormatted){
                document.getElementById('responseTimeText').textContent = data.responseTimeFormatted;
            }
            searchInfo.style.display = 'block';
        }
        
        if(data.error){
            alert(data.error);
            customers = [];
            notes = [];
            appointments = [];
        } else {
            customers = data.customers || [];
            notes = data.notes || [];
            appointments = data.appointments || [];
        }
        
        renderCustomersTable(customers);
        renderNotesTable(notes);
        renderAppointmentsTable(appointments);
    } catch(error){
        console.error('Error:', error);
        alert('Lỗi khi tìm kiếm: ' + error.message);
    } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = 'Tra cứu';
    }
}

function clearFilter(){
    document.getElementById('phoneInput').value = '';
    customers = [];
    notes = [];
    appointments = [];
    renderCustomersTable([]);
    renderNotesTable([]);
    renderAppointmentsTable([]);
}

function setupToggles(){
    document.querySelectorAll('.toggle-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
            const target = document.getElementById(btn.dataset.target);
            if(!target) return;
            target.classList.toggle('collapsed');
            btn.textContent = target.classList.contains('collapsed') ? '+' : '−';
        });
    });
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('phoneInput').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doSearch(); });
// Validate input: chỉ cho phép nhập số
document.getElementById('phoneInput').addEventListener('input', (e)=>{
    let value = e.target.value;
    // Loại bỏ tất cả ký tự không phải số
    value = value.replace(/\D/g, '');
    e.target.value = value;
});
document.getElementById('clearBtn').addEventListener('click', clearFilter);

// init
setupToggles();
        </script>
</body>
</html>

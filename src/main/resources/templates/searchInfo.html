<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeraGroup - Tra cứu thông tin khách hàng 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .timeline-line::before {
            content: '';
            position: absolute;
            top: 15px; bottom: 0; left: 15px; width: 2px; background: #e5e7eb; z-index: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-slate-600 h-screen flex flex-col overflow-hidden bg-slate-50">
    <header class="bg-white shadow-sm border-b border-slate-200 flex-none z-50">
        <div class="w-full px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2 w-[300px]">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white font-bold">
                    <i class="fa-solid fa-hospital"></i>
                </div>
                <h1 class="font-bold text-lg text-slate-800 tracking-tight">Mera<span class="text-brand-600">Group</span></h1>
            </div>

            <div class="flex-1 px-4">
                <div class="relative group max-w-2xl mx-auto flex gap-2">
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-phone text-slate-400 text-sm"></i>
                        </div>
                        <input id="phoneInput" type="text" class="block w-full pl-9 pr-3 py-2 border border-slate-200 rounded-full bg-slate-100 focus:bg-white focus:ring-2 focus:ring-brand-500 focus:outline-none transition text-sm" placeholder="Nhập SĐT khách hàng...">
                    </div>
                    <button id="searchBtn" class="bg-brand-600 text-white px-6 rounded-full text-sm font-bold hover:bg-brand-700 transition shadow-md">Tra cứu</button>
                </div>
            </div>

            <div class="flex items-center gap-3 w-[150px] justify-end">
                <a href="/search-config" class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-slate-200 hover:text-indigo-600 transition" title="Cấu hình">
                    <i class="fa-solid fa-gear"></i>
                </a>
                <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden border border-slate-300">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" alt="Admin">
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full h-full p-4 overflow-hidden">
        <div id="welcomeMessage" class="h-full flex items-center justify-center text-slate-400 flex-col gap-4">
            <i class="fa-solid fa-magnifying-glass text-6xl opacity-20"></i>
            <p class="text-lg">Nhập số điện thoại để bắt đầu tra cứu thông tin 360</p>
        </div>

        <div id="dashboardContent" class="grid grid-cols-1 lg:grid-cols-[330px_1fr_400px] gap-6 h-full min-h-0 opacity-0 transition-opacity duration-300 hidden">
            <!-- CỘT 1: PROFILE & TỔNG HỢP -->
          <div class="flex flex-col gap-5 overflow-y-auto no-scrollbar pb-10 min-h-0 h-full">
                <!-- Profile Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-none">
                    <div class="h-24 bg-gradient-to-r from-brand-600 to-teal-400"></div>
                    <div class="px-5 pb-5 text-center relative">
                        <div class="w-20 h-20 mx-auto -mt-10 bg-white rounded-full p-1 shadow-md">
                            <img id="profileAvatar" src="https://api.dicebear.com/7.x/initials/svg?seed=U&backgroundColor=e5e7eb&textColor=374151" alt="Avatar" class="w-full h-full rounded-full bg-slate-100">
                        </div>
                        <h2 id="profileName" class="mt-3 text-xl font-bold text-slate-800">Khách hàng</h2>
                        <div class="flex justify-center items-center gap-2 text-slate-500 mt-1 mb-4">
                            <span id="profilePhone" class="font-bold text-slate-700 text-lg">---</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div class="bg-emerald-50/50 p-2 rounded-xl border border-emerald-100/50">
                                <span class="block text-[10px] text-emerald-500 uppercase font-bold tracking-wider">Thành công</span>
                                <span id="profileSucceedCount" class="block text-2xl font-bold text-emerald-600">0</span>
                            </div>
                            <div class="bg-blue-50/50 p-2 rounded-xl border border-blue-100/50">
                                <span class="block text-[10px] text-blue-500 uppercase font-bold tracking-wider">Hạng</span>
                                <span id="profileStatus" class="block text-sm font-bold text-slate-700 mt-1">Khách mới</span>
                            </div>
                        </div>

                        <div class="text-left space-y-4 border-t border-slate-100 pt-4">
                            <div>
                                <span class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Customer ID</span>
                                <div id="profileCustomerId" class="bg-slate-100 text-slate-600 text-[11px] p-2 rounded-lg font-mono truncate">---</div>
                            </div>
                            <div>
                                <span class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Địa chỉ</span>
                                <p id="profileAddress" class="text-[13px] text-slate-500 leading-relaxed font-medium">---</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Product Summary Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                    <h3 class="font-bold text-slate-800 text-sm mb-4 border-b border-slate-100 pb-2 flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-brand-600"></i>
                        Tổng hợp sản phẩm đã mua
                    </h3>
                    <ul id="productSummaryWrap" class="space-y-1">
                        <!-- Data from JS -->
                    </ul>
                </div>
            </div>

            <!-- CỘT 2: LỊCH SỬ ĐƠN HÀNG -->
          <div class="flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 h-full overflow-hidden min-h-0">
                <div class="px-6 py-4 border-b border-slate-100 bg-white sticky top-0 z-10 flex justify-between items-center gap-4">
                    <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left text-brand-500"></i>
                        Lịch sử mua hàng
                    </h3>
                    <div class="flex items-center gap-3">
                        <select id="statusFilter" class="text-xs border border-slate-200 rounded-lg px-2 py-1 bg-slate-50 focus:outline-none focus:ring-1 focus:ring-brand-500 transition cursor-pointer">
                            <option value="all">Tất cả trạng thái</option>
                        </select>
                        <span id="orderCountText" class="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold uppercase shrink-0">0 đơn hàng</span>
                    </div>
                </div>

                <div id="ordersWrap" class="p-4 space-y-4 overflow-y-auto no-scrollbar flex-1 bg-slate-50/40">
                    <!-- Data from JS -->
                </div>
            </div>

            <!-- CỘT 3: NHẬT KÝ CHĂM SÓC -->
          <div class="flex flex-col h-full gap-5 min-h-0">
                <!-- POS Notes (Ghi chú POS) -->
                <div class="flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 h-[350px] overflow-hidden flex-none">
                    <div class="px-5 py-3 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="font-bold text-sm text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-note-sticky text-brand-500"></i>
                            Ghi chú (POS)
                        </h3>
                    </div>
                    <div id="posNotesWrap" class="p-4 overflow-y-auto no-scrollbar flex-1 space-y-3 bg-slate-50/20">
                        <!-- Data from JS -->
                    </div>
                </div>

                <!-- Lark Exchanges (Nhật ký chăm sóc) -->
            <div class="flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 h-full overflow-hidden min-h-0">
                    <div class="px-5 py-4 border-b border-slate-100 bg-white sticky top-0 z-10">
                        <h3 class="font-bold text-sm text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-comments text-brand-500"></i>
                            Nhật ký trao đổi (Lark)
                        </h3>
                    </div>

              <div id="exchangeHistoryWrap" class="p-5 overflow-y-auto no-scrollbar flex-1 bg-slate-50/20 min-h-0">
                        <div class="relative timeline-line">
                            <!-- Data from JS -->
                             <div id="timelineContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 text-center">
            <div class="w-12 h-12 border-4 border-slate-100 border-t-brand-500 rounded-full animate-spin"></div>
            <div>
                <p id="loadingTitle" class="font-bold text-slate-800 text-lg">Đang tổng hợp dữ liệu 360...</p>
                <p id="loadingSubtitle" class="text-sm text-slate-400 mt-1">Kết nối Pancake POS & Lark Bitable</p>
            </div>
        </div>
    </div>

    <script src="/js/search-info.js"></script>
    <script>
        // UI Helpers for smooth transition
        const originalDashboard = renderDashboard;
        window.renderDashboard = function(data) {
            document.getElementById('welcomeMessage').classList.add('hidden');
            const dashboard = document.getElementById('dashboardContent');
            dashboard.classList.remove('hidden');
            setTimeout(() => {
                dashboard.classList.add('opacity-100');
            }, 50);
            originalDashboard(data);
        }
    </script>
</body>
</html>

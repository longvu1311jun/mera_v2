<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/meraicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thống kê lịch hẹn | MeraGroup</title>
  <script th:replace="~{fragments/mera-layout :: themeInit}"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/mera-ui.css">
  <style>
    /* Alias hệ biến cũ sang token mera-ui (giữ tương thích inline style / chuỗi HTML do JS render) */
    :root {
      --color-primary: var(--mr-accent);
      --color-primary-hover: var(--mr-accent-hover);
      --color-canvas: var(--mr-canvas);
      --color-canvas-soft: var(--mr-surface-2);
      --color-surface: var(--mr-surface);
      --color-ink: var(--mr-text);
      --color-body: var(--mr-text-2);
      --color-muted: var(--mr-muted);
      --color-hairline: var(--mr-border);
      --color-hairline-strong: #cfcdc4;
      --color-on-primary: #ffffff;
      --color-success: #16a34a;
      --color-error: #dc2626;
      --color-warning: #d97706;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Workspace content full-height: giữ kiến trúc cuộn nội bộ của bảng */
    .mr-workspace-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* Header - compact */
    .page-header {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .page-meta {
      font-size: 12px;
      color: var(--mr-muted);
      margin-top: 2px;
    }

    .page-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    /* Month Toggle Buttons */
    .month-toggle {
      display: flex;
      background: var(--mr-surface);
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-control);
      overflow: hidden;
    }

    .month-btn {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--mr-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      text-decoration: none;
    }

    .month-btn:hover {
      background: var(--mr-surface-2);
      color: var(--mr-text);
    }

    .month-btn.active {
      background: var(--mr-accent);
      color: #ffffff;
    }

    .month-btn.active:hover {
      background: var(--mr-accent-hover);
    }

    /* Form Elements */
    select, input.search {
      border: 1px solid #d9d8d2;
      border-radius: var(--mr-radius-control);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--mr-surface);
      color: var(--mr-text);
      cursor: pointer;
    }

    select:focus, input.search:focus {
      outline: none;
      border-color: var(--mr-accent);
      box-shadow: 0 0 0 3px rgba(20, 86, 240, 0.12);
    }

    input.search {
      width: 200px;
    }

    button {
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-control);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      background: var(--mr-surface);
      color: var(--mr-text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: var(--mr-surface-2);
    }

    button.primary {
      background: var(--mr-accent);
      color: #ffffff;
      border: 1px solid transparent;
    }

    button.primary:hover {
      background: var(--mr-accent-hover);
    }

    a.btn-excel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--mr-radius-control);
      background: #16a34a;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    a.btn-excel:hover {
      background: #15803d;
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .alert.error {
      background: var(--mr-danger-bg);
      border: 1px solid #fca5a5;
      color: var(--mr-danger);
    }

    .alert.success {
      background: var(--mr-success-bg);
      border: 1px solid #86efac;
      color: var(--mr-success);
    }

    /* Summary Cards - compact row */
    .stats-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .summary-card {
      background: var(--mr-surface);
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-card);
      padding: 14px 18px;
      flex: 1;
      text-align: center;
    }

    .summary-card h3 {
      color: var(--mr-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 22px;
      font-weight: 700;
      color: var(--mr-text);
      font-variant-numeric: tabular-nums;
    }

    /* Table Container */
    .table-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--mr-surface);
      border: 1px solid var(--mr-border);
      border-radius: var(--mr-radius-card);
      overflow: hidden;
      min-height: 0;
    }

    .table-wrapper {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    table.mr-table {
      min-width: 800px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead th.sortable {
      cursor: pointer;
      user-select: none;
    }

    thead th.sortable:hover {
      background: var(--mr-accent-soft);
      color: var(--mr-accent);
    }

    thead th .sort-indicator {
      margin-left: 6px;
      font-size: 11px;
      opacity: 0.7;
    }

    .mr-table tbody td {
      padding: 10px 14px;
      vertical-align: middle;
    }

    .mr-table tbody tr:nth-child(even) {
      background: var(--mr-surface-2);
    }

    /* Footer - fixed at bottom */
    tfoot {
      position: sticky;
      bottom: 0;
      z-index: 5;
    }

    tfoot tr {
      background: var(--mr-surface-2);
      font-weight: 600;
    }

    tfoot td {
      padding: 10px 12px;
      border-top: 2px solid var(--mr-accent);
      font-size: 12px;
      color: var(--mr-text);
    }

    .stt {
      color: var(--mr-accent);
      font-weight: 600;
      text-align: center;
      width: 50px;
    }

    .number-cell {
      text-align: center;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .employee-name {
      font-weight: 600;
      color: var(--mr-text);
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(247, 247, 244, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-content {
      background: var(--mr-surface);
      padding: 24px 40px;
      border-radius: var(--mr-radius-card);
      text-align: center;
      border: 1px solid var(--mr-border);
    }

    .loading-spinner {
      border: 3px solid var(--mr-border);
      border-top: 3px solid var(--mr-accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-overlay.hidden {
      display: none;
    }

    [data-theme="dark"] .loading-overlay {
      background: rgba(22, 24, 29, 0.95);
    }

    [data-theme="dark"] select, [data-theme="dark"] input.search {
      border-color: #383d48;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        height: auto;
        overflow: auto;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .page-actions {
        width: 100%;
        flex-wrap: wrap;
      }

      .stats-summary {
        flex-wrap: wrap;
      }

      .summary-card {
        min-width: calc(50% - 6px);
      }

      input.search {
        width: 100%;
      }

      .table-container {
        height: auto;
        min-height: 400px;
      }

      .month-toggle {
        width: 100%;
      }

      .month-btn {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body class="mera-page">

<!-- Loading popup -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div style="font-size: 13px; color: var(--color-body);">Đang tải dữ liệu...</div>
  </div>
</div>

<th:block th:replace="~{fragments/mera-layout :: workspaceHeader('Thống Kê Lịch Hẹn')}"></th:block>

<div class="mr-workspace-content">

<div class="page-header">
  <div class="page-meta" id="fetchedAtInfo"></div>

  <div class="page-actions">
    <input id="searchInput" class="search" type="search" placeholder="Tìm nhân viên..." />

    <div class="month-toggle">
      <a href="/stats?customerMonth=CurrentMonth" id="currentMonthBtn" class="month-btn active">📅 Tháng Này</a>
      <a href="/stats?customerMonth=LastMonth" id="lastMonthBtn" class="month-btn">📆 Tháng Trước</a>
    </div>

    <form action="/stats/refresh" method="post" id="refreshForm">
      <input type="hidden" name="customerMonth" id="refreshCustomerMonth" />
      <button type="submit" class="primary">🔄 Làm mới</button>
    </form>

    <a href="#" id="exportStatsBtn" class="btn-excel">
      📥 Excel
    </a>
  </div>
</div>

<div id="errorAlert" class="alert error" style="display:none;"></div>
<div id="successAlert" class="alert success" style="display:none;"></div>

<!-- Summary Cards -->
<div class="stats-summary" id="summaryCards" style="display:none;">
  <div class="summary-card">
    <h3>Tổng NV</h3>
    <div class="value" id="totalEmployees">0</div>
  </div>
  <div class="summary-card">
    <h3>Tổng Khách</h3>
    <div class="value" id="totalKhach">0</div>
  </div>
  <div class="summary-card">
    <h3>Tổng Lịch</h3>
    <div class="value" id="totalLich">0</div>
  </div>
  <div class="summary-card">
    <h3>Hoàn Thành</h3>
    <div class="value" id="totalHoanThanh">0</div>
  </div>
</div>

<!-- Table -->
<div class="table-container">
  <div class="table-wrapper">
    <table class="stats-table mr-table">
      <thead>
        <tr>
          <th style="width:50px;">STT</th>
          <th>Tên Nhân Viên</th>
          <th>Tổng Khách</th>
          <th>Tổng Lịch</th>
          <th>Hoàn Thành Muộn</th>
          <th>Hoàn Thành</th>
          <th>Quá Hạn</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot">
        <tr>
          <td colspan="2" class="stt">TỔNG</td>
          <td class="number-cell" id="totalKhachFoot">0</td>
          <td class="number-cell" id="totalLichFoot">0</td>
          <td class="number-cell" id="totalMuonFoot">0</td>
          <td class="number-cell" id="totalHoanThanhFoot">0</td>
          <td class="number-cell" id="totalQuaHanFoot">0</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

</div>

<th:block th:replace="~{fragments/mera-layout :: shellScript}"></th:block>

<script>
let statsRows = [];
let statsOriginalRows = [];

document.addEventListener('DOMContentLoaded', function(){
  const table = document.querySelector('.stats-table');
  if(!table) return;
  const tbody = table.querySelector('tbody');
  statsRows = Array.from(tbody.querySelectorAll('tr')).filter(r=> r.querySelectorAll('td').length>0);
  statsOriginalRows = statsRows.slice();
  const searchInput = document.getElementById('searchInput');
  const currentMonthBtn = document.getElementById('currentMonthBtn');
  const lastMonthBtn = document.getElementById('lastMonthBtn');
  const exportStatsBtn = document.getElementById('exportStatsBtn');

  const now = new Date();
  const currentMonth = now.getMonth() + 1;
  const lastMonth = currentMonth === 1 ? 12 : currentMonth - 1;
  if (currentMonthBtn) currentMonthBtn.textContent = `📅 Tháng ${currentMonth}`;
  if (lastMonthBtn) lastMonthBtn.textContent = `📆 Tháng ${lastMonth}`;

  const ths = Array.from(table.querySelectorAll('thead th'));
  ths.forEach((th, idx)=>{
    if(idx===0) return;
    th.classList.add('sortable');
    const span = document.createElement('span');
    span.className = 'sort-indicator';
    th.appendChild(span);
    th.dataset.sortState = 'none';
    th.addEventListener('click', ()=>{
      const state = th.dataset.sortState;
      const next = state==='none' ? 'asc' : state==='asc' ? 'desc' : 'none';
      ths.forEach(t=>{ if(t!==th){ t.dataset.sortState='none'; const si = t.querySelector('.sort-indicator'); if(si) si.textContent=''; }});
      th.dataset.sortState = next;
      const ind = th.querySelector('.sort-indicator');
      if(ind) ind.textContent = next==='asc' ? '▲' : next==='desc' ? '▼' : '';
      if(next==='none'){
        restoreOriginalOrder();
        applyFilter();
      } else {
        sortByColumn(idx, next);
      }
    });
  });

  function parseCellValue(text){
    if(!text) return '';
    const trimmed = text.replace('%','').replace(/,/g,'').trim();
    if(trimmed==='') return '';
    const n = parseFloat(trimmed);
    if(!isNaN(n)) return n;
    return trimmed.toLowerCase();
  }

  function sortByColumn(idx, order){
    const visible = statsRows.filter(r=> r.style.display !== 'none');
    visible.sort((a,b)=>{
      const aV = parseCellValue((a.children[idx]||{}).textContent||'');
      const bV = parseCellValue((b.children[idx]||{}).textContent||'');
      if(typeof aV === 'number' && typeof bV === 'number'){
        return order==='asc' ? aV - bV : bV - aV;
      } else {
        return order==='asc' ? String(aV).localeCompare(String(bV)) : String(bV).localeCompare(String(aV));
      }
    });
    const hidden = statsOriginalRows.filter(r=> r.style.display === 'none');
    tbody.innerHTML = '';
    visible.forEach(r=> tbody.appendChild(r));
    hidden.forEach(r=> tbody.appendChild(r));
  }

  function restoreOriginalOrder(){
    tbody.innerHTML = '';
    statsOriginalRows.forEach(r=> tbody.appendChild(r));
    statsRows = Array.from(tbody.querySelectorAll('tr')).filter(r=> r.querySelectorAll('td').length>0);
    updateTotalsFromVisibleRows();
  }

  function applyFilter(){
    const q = (searchInput ? searchInput.value : '').trim().toLowerCase();
    statsRows.forEach(r=>{
      const nameCell = r.children[1];
      const text = nameCell ? nameCell.textContent.toLowerCase() : '';
      r.style.display = q === '' || text.indexOf(q) !== -1 ? '' : 'none';
    });
    updateTotalsFromVisibleRows();
    const activeTh = ths.find(t=> t.dataset.sortState && t.dataset.sortState!=='none');
    if(activeTh){
      sortByColumn(ths.indexOf(activeTh), activeTh.dataset.sortState);
    }
  }

  function updateTotalsFromVisibleRows(){
    let totalKhach = 0, totalLich = 0, totalMuon = 0, totalHoanThanh = 0, totalQuaHan = 0;
    const visibleRows = statsRows.filter(r => r.style.display !== 'none');
    visibleRows.forEach(tr => {
      const cells = tr.children;
      if (cells.length >= 7) {
        totalKhach += parseInt(cells[2].textContent.replace(/\./g, '')) || 0;
        totalLich += parseInt(cells[3].textContent.replace(/\./g, '')) || 0;
        totalMuon += parseInt(cells[4].textContent.replace(/\./g, '')) || 0;
        totalHoanThanh += parseInt(cells[5].textContent.replace(/\./g, '')) || 0;
        totalQuaHan += parseInt(cells[6].textContent.replace(/\./g, '')) || 0;
      }
    });
    document.getElementById('totalKhachFoot').textContent = formatNumber(totalKhach);
    document.getElementById('totalLichFoot').textContent = formatNumber(totalLich);
    document.getElementById('totalMuonFoot').textContent = formatNumber(totalMuon);
    document.getElementById('totalHoanThanhFoot').textContent = formatNumber(totalHoanThanh);
    document.getElementById('totalQuaHanFoot').textContent = formatNumber(totalQuaHan);
  }

  if(searchInput){
    searchInput.addEventListener('input', ()=>{ applyFilter(); });
  }

});

(async function() {
  const loadingOverlay = document.getElementById('loadingOverlay');
  const tableBody = document.getElementById('tableBody');
  const fetchedAtInfo = document.getElementById('fetchedAtInfo');
  const errorAlert = document.getElementById('errorAlert');
  const successAlert = document.getElementById('successAlert');
  const summaryCards = document.getElementById('summaryCards');
  const currentMonthBtn = document.getElementById('currentMonthBtn');
  const lastMonthBtn = document.getElementById('lastMonthBtn');
  const refreshCustomerMonth = document.getElementById('refreshCustomerMonth');
  const exportStatsBtn = document.getElementById('exportStatsBtn');
  
  const urlParams = new URLSearchParams(window.location.search);
  const customerMonth = urlParams.get('customerMonth') || 'CurrentMonth';
  refreshCustomerMonth.value = customerMonth;
  
  if (customerMonth === 'CurrentMonth') {
    currentMonthBtn.classList.add('active');
    lastMonthBtn.classList.remove('active');
  } else {
    currentMonthBtn.classList.remove('active');
    lastMonthBtn.classList.add('active');
  }
  
  loadingOverlay.classList.remove('hidden');
  
  try {
    const response = await fetch(`/api/stats/data?customerMonth=${encodeURIComponent(customerMonth)}`);
    const data = await response.json();
    
    loadingOverlay.classList.add('hidden');
    
    if (data.error) {
      errorAlert.style.display = 'flex';
      errorAlert.textContent = data.error;
      return;
    }
    
    if (data.fetchedAt) {
      const fromCache = data.fromCache ? '📦 Cache - ' : '🔄 Mới - ';
      const date = new Date(data.fetchedAt);
      const formattedDate = date.toLocaleString('vi-VN', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
      fetchedAtInfo.innerHTML = `${fromCache}Cập nhật: <strong>${formattedDate}</strong>`;
    }
    
    if (data.statsList && data.statsList.length > 0) {
      summaryCards.style.display = 'flex';
      document.getElementById('totalEmployees').textContent = data.statsList.length;
      document.getElementById('totalKhach').textContent = formatNumber(data.totalKhach || 0);
      document.getElementById('totalLich').textContent = formatNumber(data.totalLich || 0);
      document.getElementById('totalHoanThanh').textContent = formatNumber(data.totalHoanThanh || 0);
      
      document.getElementById('totalKhachFoot').textContent = formatNumber(data.totalKhach || 0);
      document.getElementById('totalLichFoot').textContent = formatNumber(data.totalLich || 0);
      document.getElementById('totalHoanThanhFoot').textContent = formatNumber(data.totalHoanThanh || 0);
    }
    
    if (data.statsList && data.statsList.length > 0) {
      tableBody.innerHTML = '';
      data.statsList.forEach((stat, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="stt">${index + 1}</td>
          <td class="employee-name">${escapeHtml(stat.employeeName || '-')}</td>
          <td class="number-cell">${formatNumber(stat.tongKhach || 0)}</td>
          <td class="number-cell">${formatNumber(stat.tongLich || 0)}</td>
          <td class="number-cell">${formatNumber(stat.hoanThanhMuon || 0)}</td>
          <td class="number-cell">${formatNumber(stat.hoanThanh || 0)}</td>
          <td class="number-cell">${formatNumber(stat.quaHan || 0)}</td>
        `;
        tableBody.appendChild(tr);
      });
      
      setTimeout(() => {
        const tbody = document.querySelector('tbody');
        if (tbody) {
          statsRows = Array.from(tbody.querySelectorAll('tr')).filter(r => r.querySelectorAll('td').length > 0);
          statsOriginalRows = statsRows.map(r => r.cloneNode(true));
        }
      }, 100);
    } else {
      tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--color-muted);">Không có dữ liệu. <a href="/config" style="color: var(--color-primary);">Cấu hình</a></td></tr>';
    }
    
    if (exportStatsBtn) {
      exportStatsBtn.onclick = (e) => {
        e.preventDefault();
        const exportUrl = `/stats/export?customerMonth=${encodeURIComponent(customerMonth)}`;
        const link = document.createElement('a');
        link.href = exportUrl;
        link.download = '';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };
    }

  } catch (error) {
    loadingOverlay.classList.add('hidden');
    errorAlert.style.display = 'flex';
    errorAlert.textContent = 'Lỗi khi tải dữ liệu: ' + error.message;
  }
})();

function formatNumber(num) {
  return new Intl.NumberFormat('vi-VN').format(num);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>

</body>
</html>
